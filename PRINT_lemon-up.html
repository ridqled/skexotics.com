<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>SK Exotics — Lemon Up — Print Sheet</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
@page{size:A4;margin:8mm}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#fff}
.screen{background:#050A1A;color:#FFD600;padding:14px 20px;font-family:'Arial Black',Arial,sans-serif;font-size:16px;letter-spacing:2px;display:flex;justify-content:space-between;align-items:center;border-bottom:3px solid #1565C0}
.screen small{color:#42A5F5;font-size:11px;font-weight:normal;font-family:Arial}
.btn{display:block;margin:14px auto;padding:12px 40px;background:#1565C0;color:#FFD600;font-size:15px;font-weight:900;border:none;border-radius:8px;cursor:pointer;letter-spacing:1px}
@media print{.screen,.btn{display:none!important}}
.a4{width:210mm;min-height:297mm;page-break-after:always;padding:6mm;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:6mm}
.sticker{border:2px solid #1565C0;border-radius:3mm;padding:3mm 2mm;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#fff;aspect-ratio:1}
.s-top{font-size:6.5pt;font-weight:900;letter-spacing:.5px;text-transform:uppercase;text-align:center;color:#1565C0;margin-bottom:2.5mm}
.qr-wrap{border:2px solid #050A1A;padding:1.5mm;background:#fff;line-height:0}
.s-num{font-size:13pt;font-weight:900;color:#050A1A;margin-top:2.5mm;letter-spacing:2px}
.s-dates{font-size:5pt;color:#666;margin-top:1.5mm;text-align:center;line-height:1.6}
.s-brand{font-size:5.5pt;font-weight:900;letter-spacing:2px;color:#1565C0;margin-top:1.5mm;text-transform:uppercase}
</style></head>
<body>
<div class="screen">⭐ SK EXOTICS — LEMON UP PRINT SHEET <small>8 QR labels · unique per jar · Cut &amp; stick</small></div>
<button class="btn" onclick="window.print()">🖨️ PRINT (8 QR CODES)</button>
<div id="pages"></div>
<script>
const urls=["https://skexotics.com/products/lemon-up-01.html","https://skexotics.com/products/lemon-up-02.html","https://skexotics.com/products/lemon-up-03.html","https://skexotics.com/products/lemon-up-04.html","https://skexotics.com/products/lemon-up-05.html","https://skexotics.com/products/lemon-up-06.html","https://skexotics.com/products/lemon-up-07.html","https://skexotics.com/products/lemon-up-08.html"];
const pagesDiv=document.getElementById('pages');
const perPage=6;
const totalPages=Math.ceil(urls.length/perPage);
for(let p=0;p<totalPages;p++){
  const pg=document.createElement('div');pg.className='a4';
  const start=p*perPage;
  const end=Math.min(start+perPage,urls.length);
  for(let i=start;i<end;i++){
    const num=String(i+1).padStart(2,'0');
    const el=document.createElement('div');el.className='sticker';
    el.innerHTML=`<div class="s-top">Lemon Up</div><div class="qr-wrap" id="q${i}"></div><div class="s-num">#${num}</div><div class="s-dates">Cultivated: 06/01/2026<br>Packaged: 10/03/2026</div><div class="s-brand">SK EXOTICS</div>`;
    pg.appendChild(el);
  }
  pagesDiv.appendChild(pg);
}
window.addEventListener('load',()=>{
  urls.forEach((url,i)=>{new QRCode(document.getElementById('q'+i),{text:url,width:130,height:130,colorDark:'#000000',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.M});});
});
</script></body></html>
