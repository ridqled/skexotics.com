<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SK Exotics</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--blue:#1565C0;--blue-light:#42A5F5;--blue-dark:#0D47A1;--gold:#FFD600;--bg:#050A1A;--card:#0A1628;--border:#1A2A4A;--text:#E8EAF6;--muted:#546E8A}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:radial-gradient(circle at top, rgba(21,101,192,0.22), transparent 42%),var(--bg);color:var(--text);font-family:'Barlow',sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}
.hero{width:100%;max-width:520px;background:rgba(10,22,40,0.92);border:1px solid var(--border);border-radius:28px;box-shadow:0 20px 60px rgba(0,0,0,0.45);padding:34px 28px;text-align:center}
.hero img{width:min(100%,340px);display:block;margin:0 auto 16px;filter:drop-shadow(0 14px 30px rgba(0,0,0,0.45))}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-size:42px;letter-spacing:4px;color:var(--gold);margin-bottom:8px}
.hero p{font-size:14px;line-height:1.7;color:var(--muted);max-width:380px;margin:0 auto 24px}
.btn{display:inline-block;width:100%;max-width:280px;padding:16px 18px;border-radius:14px;background:linear-gradient(135deg,var(--blue),var(--blue-dark));color:var(--gold);text-decoration:none;font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:3px;text-transform:uppercase}
.sub{margin-top:16px;font-size:11px;letter-spacing:2px;color:var(--blue-light);text-transform:uppercase}
</style>
</head>
<body>
  <div class="hero">
    <img src="/sk-logo.png" alt="SK Exotics logo">
    <h1>SK EXOTICS</h1>
    <p>Scan authentic products, build points, and unlock exclusive member rewards.</p>
    <a class="btn" href="/login.html">Enter Members Club</a>
    <div class="sub">Official SK Exotics Rewards</div>
  </div>
</body>
</html>
